name: Rails Stack Docker Deployment

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    name: Build and Rotate Containers
    runs-on: [self-hosted, rails-production]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Runtime Environment File
        run: |
          echo "RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}" >> .env
          echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env

      - name: Build Application App Image
        run: |
          docker compose -f docker-compose.prod.yml build app

      - name: Boot Database and Messaging Services
        run: |
          # Starts db, redis, and rabbitmq. The workflow blocks until healthchecks pass.
          docker compose -f docker-compose.prod.yml up -d db redis rabbitmq
          sleep 10

      - name: Run Database Migrations
        run: |
          # Executes migrations safely inside a transient app container context
          docker compose -f docker-compose.prod.yml run --rm app bundle exec rails db:migrate

      - name: Deploy Live App Service Container
        run: |
          # Recreates and boots the app server container with zero downtime
          docker compose -f docker-compose.prod.yml up -d app

      - name: Clear Old Cache Images
        run: |
          # Prevents the EC2 disk from filling up over continuous deployments
          docker image prune -f

amazon:
  service: S3
  access_key_id: <%= ENV['AWS_BUCKET_ACCESS_KEY'] %>
  secret_access_key: <%= ENV['AWS_BUCKET_SECRET_KEY'] %>
  region: <%= ENV['AWS_REGION'] %>
  bucket: <%= ENV['AWS_BUCKET_NAME'] %>

test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>
